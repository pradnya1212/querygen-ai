<!DOCTYPE html>
<html>
<head>
<title>QueryGen AI</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
header { background:#1e293b; padding:15px; text-align:center; font-size:22px; }

.container { display:flex; height:90vh; }

.sidebar {
    width:250px; background:#1e293b; padding:20px;
}

.sidebar button {
    width:100%; margin:5px 0; padding:10px;
    background:#334155; border:none; color:white; cursor:pointer;
}

.main { flex:1; display:flex; flex-direction:column; }

.chat { flex:1; padding:20px; overflow-y:auto; }

.msg { margin:10px 0; padding:10px; border-radius:8px; max-width:70%; }
.user { background:#2563eb; align-self:flex-end; }
.bot { background:#334155; }

.input-box { display:flex; padding:15px; background:#1e293b; }
input { flex:1; padding:12px; }
button.send { padding:12px; background:#22c55e; border:none; color:white; }

table {
    width:100%; background:white; color:black;
    border-collapse:collapse;
}
td, th { padding:8px; border:1px solid #ddd; }
</style>
</head>

<body>

<header>🤖 QueryGen AI Dashboard</header>

<div class="container">

<div class="sidebar">
    <button onclick="quick('show all employees')">Employees</button>
    <button onclick="quick('employees in IT')">IT Dept</button>
    <button onclick="quick('highest salary')">Highest Salary</button>
    <button onclick="quick('salary above 60000')">High Salary</button>
</div>

<div class="main">
    <div class="chat" id="chat"></div>

    <div class="input-box">
        <input id="q" placeholder="Ask anything...">
        <button class="send" onclick="send()">Send</button>
    </div>
</div>

</div>

<script>
function addMessage(text, type){
    let chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function quick(text){
    document.getElementById("q").value = text;
    send();
}

function send(){
    let input = document.getElementById("q");
    let q = input.value;

    if(!q) return;

    addMessage("🧑 " + q, "user");
    input.value = "";

    fetch(`/ask?q=${encodeURIComponent(q)}`)
    .then(res => res.json())
    .then(data => {

        let msg = "<b>🤖 AI:</b> " + data.message;

        if(data.query){
            msg += "<br><br><b>SQL:</b><br>" + data.query;
        }

        if(data.data){
            let table = "<table>";

            data.data.forEach(row => {
                table += "<tr>";
                row.forEach(cell => table += `<td>${cell}</td>`);
                table += "</tr>";
            });

            table += "</table>";
            msg += "<br><br>" + table;
        }

        addMessage(msg, "bot");
    })
    .catch(() => addMessage("⚠️ Server error", "bot"));
}
</script>

</body>
</html>
